<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZAN MARKETPLACE</title>

<style>
body{
  background:#020617;
  color:white;
  font-family:sans-serif;
  padding:15px;
}
input,button{
  margin:5px;
  padding:10px;
  border-radius:8px;
  border:none;
}
button{background:#38bdf8;color:white;cursor:pointer;}
.card{
  background:#111;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
}
</style>
</head>

<body>

<h2>🔥 ZAN MARKETPLACE</h2>

<!-- LOGIN -->
<div id="auth">
  <input id="email" placeholder="Email"><br>
  <input id="pass" type="password" placeholder="Password"><br>
  <button onclick="login()">Login / Register</button>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <h3>💰 Saldo: Rp <span id="saldo">0</span></h3>
  <button onclick="topup()">Top Up</button>

  <h3>📤 Jual ID</h3>
  <input id="idff" placeholder="ID FF"><br>
  <input id="harga" placeholder="Harga"><br>
  <button onclick="jual()">Jual</button>

  <h3>🛒 Marketplace</h3>
  <div id="list"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot, collection, addDoc, runTransaction, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔥 CONFIG LU */
const firebaseConfig = {
  apiKey: "AIzaSyBPHIMSfTPborU-P4stCb88ZpAtqWHWx54",
  authDomain: "zanstore-96e12.firebaseapp.com",
  projectId: "zanstore-96e12",
  storageBucket: "zanstore-96e12.firebasestorage.app",
  messagingSenderId: "852219530181",
  appId: "1:852219530181:web:47a8521243a59ecca819ac"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let uid = "";

/* LOGIN */
window.login = function(){
  let email = document.getElementById("email").value;
  let pass = document.getElementById("pass").value;

  if(!email || !pass){
    alert("Isi email & password!");
    return;
  }

  signInWithEmailAndPassword(auth,email,pass)
  .catch(()=>{
    createUserWithEmailAndPassword(auth,email,pass);
  });
}

/* AUTO LOGIN */
onAuthStateChanged(auth,(user)=>{
  if(user){
    uid = user.uid;

    document.getElementById("auth").style.display="none";
    document.getElementById("app").style.display="block";

    loadUser();
    loadMarket();
  }
});

/* USER */
function loadUser(){
  let ref = doc(db,"users",uid);

  getDoc(ref).then(d=>{
    if(!d.exists()){
      setDoc(ref,{saldo:0});
    }
  });

  onSnapshot(ref,(d)=>{
    if(d.exists()){
      document.getElementById("saldo").innerText = d.data().saldo;
    }
  });
}

/* TOPUP */
window.topup = function(){
  let n = parseInt(prompt("Masukkan jumlah top up"));
  if(!n || n < 1000){
    alert("Minimal 1000");
    return;
  }

  updateDoc(doc(db,"users",uid),{
    saldo: increment(n)
  });
}

/* JUAL */
window.jual = function(){
  let idff = document.getElementById("idff").value;
  let harga = parseInt(document.getElementById("harga").value);

  if(!idff || !harga){
    alert("Isi semua!");
    return;
  }

  addDoc(collection(db,"market"),{
    idff:idff,
    harga:harga,
    seller:uid,
    sold:false
  });

  alert("ID berhasil dijual!");
}

/* MARKET */
function loadMarket(){
  onSnapshot(collection(db,"market"),snap=>{
    let html="";

    snap.forEach(docu=>{
      let d = docu.data();

      html+=`
      <div class="card">
        <b style="word-break:break-all">${d.idff}</b><br>
        Rp ${d.harga}<br>
        ${d.sold ? "SOLD" : `<button onclick="beli('${docu.id}',${d.harga},'${d.seller}')">Beli</button>`}
      </div>`;
    });

    document.getElementById("list").innerHTML=html;
  });
}

/* BELI */
window.beli = function(id,harga,seller){
  let userRef = doc(db,"users",uid);
  let sellerRef = doc(db,"users",seller);
  let itemRef = doc(db,"market",id);

  runTransaction(db, async (t)=>{
    let userDoc = await t.get(userRef);
    let itemDoc = await t.get(itemRef);

    if(itemDoc.data().sold){
      alert("Udah dibeli orang!");
      return;
    }

    if(userDoc.data().saldo < harga){
      alert("Saldo kurang!");
      return;
    }

    t.update(userRef,{saldo: increment(-harga)});
    t.update(sellerRef,{saldo: increment(harga)});
    t.update(itemRef,{sold:true});
  });
}

</script>

</body>
</html>
