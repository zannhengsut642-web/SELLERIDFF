<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZAN MARKETPLACE SECURE</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>
body{background:#020617;color:white;font-family:sans-serif;padding:15px}
input,button{margin:5px;padding:10px;border-radius:8px;border:none}
button{background:#38bdf8;color:white;cursor:pointer}
.card{background:#111;padding:10px;margin:10px 0;border-radius:10px}
.popup{
display:none;position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.8);justify-content:center;align-items:center;
}
.box{background:#020617;padding:20px;border-radius:15px;text-align:center}
</style>
</head>

<body>

<h2>🔥 ZAN MARKETPLACE (SECURE)</h2>

<div id="auth">
<input id="email" placeholder="Email"><br>
<input id="pass" type="password" placeholder="Password"><br>
<button onclick="login()">Login / Register</button>
</div>

<div id="app" style="display:none">
<h3>💰 Saldo: Rp <span id="saldo">0</span></h3>
<button onclick="topup()">Top Up</button>

<h3>📤 Jual ID</h3>
<input id="idff" placeholder="ID FF"><br>
<input id="harga" placeholder="Harga"><br>
<button onclick="jual()">Jual</button>

<h3>🛒 Marketplace</h3>
<div id="list"></div>
</div>

<!-- POPUP TOPUP -->
<div class="popup" id="topupBox">
<div class="box">
<h3>💰 Top Up Saldo</h3>
<p>Scan QRIS lalu kirim bukti</p>

<img src="https://raw.githubusercontent.com/zannhengsut642-web/WEBSHOPZAN/main/qris.jpg" width="200"><br><br>

<input id="nominalTopup" placeholder="Nominal"><br>

<button onclick="kirimBukti()">Kirim Bukti</button>
<button onclick="tutupTopup()">Tutup</button>
</div>
</div>

<script>

/* FIREBASE CONFIG */
var firebaseConfig = {
apiKey: "AIzaSyBPHIMSfTPborU-P4stCb88ZpAtqWHWx54",
authDomain: "zanstore-96e12.firebaseapp.com",
projectId: "zanstore-96e12",
storageBucket: "zanstore-96e12.firebasestorage.app",
messagingSenderId: "852219530181",
appId: "1:852219530181:web:47a8521243a59ecca819ac"
};

firebase.initializeApp(firebaseConfig);

var auth = firebase.auth();
var db = firebase.firestore();
var uid = "";

/* LOGIN */
function login(){
let email = document.getElementById("email").value;
let pass = document.getElementById("pass").value;

if(!email || !pass){
alert("Isi email & password!");
return;
}

auth.signInWithEmailAndPassword(email,pass)
.catch(()=> auth.createUserWithEmailAndPassword(email,pass));
}

/* AUTO LOGIN */
auth.onAuthStateChanged(user=>{
if(user){
uid = user.uid;

document.getElementById("auth").style.display="none";
document.getElementById("app").style.display="block";

loadUser();
loadMarket();
}
});

/* USER */
function loadUser(){
let ref = db.collection("users").doc(uid);

ref.get().then(d=>{
if(!d.exists){
ref.set({saldo:0});
}
});

ref.onSnapshot(d=>{
if(d.exists){
document.getElementById("saldo").innerText = d.data().saldo;
}
});
}

/* TOPUP (AMAN) */
function topup(){
document.getElementById("topupBox").style.display="flex";
}

function tutupTopup(){
document.getElementById("topupBox").style.display="none";
}

/* KIRIM BUKTI */
function kirimBukti(){
let nominal = parseInt(document.getElementById("nominalTopup").value);

if(!nominal || nominal < 1000 || nominal > 1000000){
alert("Nominal tidak valid!");
return;
}

let nomorAdmin = "6282326978091";

let pesan = `TOP UP SALDO
Nominal: Rp ${nominal}
User ID: ${uid}
Saya sudah transfer, mohon cek.`;

window.open("https://wa.me/"+nomorAdmin+"?text="+encodeURIComponent(pesan));
}

/* JUAL */
function jual(){
let idff = document.getElementById("idff").value;
let harga = parseInt(document.getElementById("harga").value);

if(!idff || !harga){
alert("Isi semua!");
return;
}

db.collection("market").add({
idff:idff,
harga:harga,
seller:uid,
sold:false
});

alert("ID berhasil dijual!");
}

/* MARKET */
function loadMarket(){
db.collection("market").onSnapshot(snap=>{
let html="";

snap.forEach(doc=>{
let d = doc.data();

html+=`
<div class="card">
<b style="word-break:break-all">${d.idff}</b><br>
Rp ${d.harga}<br>
${d.sold ? "SOLD" : `<button onclick="beli('${doc.id}',${d.harga},'${d.seller}')">Beli</button>`}
</div>`;
});

document.getElementById("list").innerHTML=html;
});
}

/* BELI */
function beli(id,harga,seller){
let userRef = db.collection("users").doc(uid);
let sellerRef = db.collection("users").doc(seller);
let itemRef = db.collection("market").doc(id);

db.runTransaction(t=>{
return t.get(userRef).then(userDoc=>{
return t.get(itemRef).then(itemDoc=>{

if(itemDoc.data().sold){
alert("Udah dibeli!");
return;
}

if(userDoc.data().saldo < harga){
alert("Saldo kurang!");
return;
}

t.update(userRef,{
saldo: firebase.firestore.FieldValue.increment(-harga)
});

t.update(sellerRef,{
saldo: firebase.firestore.FieldValue.increment(harga)
});

t.update(itemRef,{sold:true});
});
});
});
}

</script>

</body>
</html>
