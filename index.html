<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Stickman Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
}
video,canvas{
  position:absolute;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  object-fit:cover;
}
#status{
  position:absolute;
  top:10px;
  left:10px;
  color:white;
  background:rgba(0,0,0,.6);
  padding:8px;
  font-family:Arial;
  z-index:999;
}
</style>
</head>
<body>

<div id="status">Loading...</div>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<script>

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const statusBox = document.getElementById("status");

function drawLine(a,b){

  if(!a || !b) return;
  if(a.score < 0.3 || b.score < 0.3) return;

  ctx.beginPath();
  ctx.moveTo(a.x,a.y);
  ctx.lineTo(b.x,b.y);
  ctx.strokeStyle = "white";
  ctx.lineWidth = 4;
  ctx.stroke();

}

async function start(){

  const stream =
  await navigator.mediaDevices.getUserMedia({
    video:{
      facingMode:"environment"
    }
  });

  video.srcObject = stream;

  await new Promise(resolve=>{
    video.onloadedmetadata = resolve;
  });

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  statusBox.innerText = "Loading AI...";

  const detector =
  await poseDetection.createDetector(
    poseDetection.SupportedModels.MoveNet
  );

  statusBox.innerText = "Stickman Ready";

  async function detect(){

    const poses =
    await detector.estimatePoses(video);

    ctx.clearRect(
      0,
      0,
      canvas.width,
      canvas.height
    );

    poses.forEach(pose=>{

      const k = pose.keypoints;

      // kepala
      drawLine(k[0],k[1]);
      drawLine(k[0],k[2]);

      // bahu
      drawLine(k[5],k[6]);

      // tangan kiri
      drawLine(k[5],k[7]);
      drawLine(k[7],k[9]);

      // tangan kanan
      drawLine(k[6],k[8]);
      drawLine(k[8],k[10]);

      // badan
      drawLine(k[5],k[11]);
      drawLine(k[6],k[12]);
      drawLine(k[11],k[12]);

      // kaki kiri
      drawLine(k[11],k[13]);
      drawLine(k[13],k[15]);

      // kaki kanan
      drawLine(k[12],k[14]);
      drawLine(k[14],k[16]);

    });

    requestAnimationFrame(detect);

  }

  detect();

}

start().catch(err=>{
  statusBox.innerText = err.message;
});

</script>

</body>
</html>
